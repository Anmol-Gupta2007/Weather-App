<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="bg-animation" class="bg-default"></div>

    <div class="app-wrapper">
        <div class="weather-container">
            <h1 class="app-title">Weather App</h1>
            
            <div class="search-box">
                <button id="location-btn" title="Use My Location">📍</button>
                <input type="text" id="city-input" list="city-suggestions" placeholder="Type to search cities..." autocomplete="off">
                <datalist id="city-suggestions"></datalist>
                <button id="search-btn">Search</button>
            </div>
            
            <div class="weather-info" id="weather-info" style="display: none;">
                <h2 id="city-name">City Name</h2>
                <div class="temperature">
                    <span id="temp">--</span>°C
                </div>
                <div class="description" id="weather-desc">Weather Description</div>
                
                <div class="metrics-grid">
                    <div class="metric-card">
                        <span class="label">Humidity</span>
                        <span class="value" id="humidity">--%</span>
                    </div>
                    <div class="metric-card">
                        <span class="label">Wind</span>
                        <span class="value" id="wind-speed">-- km/h</span>
                    </div>
                    <div class="metric-card">
                        <span class="label">Pressure</span>
                        <span class="value" id="pressure">-- hPa</span>
                    </div>
                    <div class="metric-card">
                        <span class="label">UV Index</span>
                        <span class="value" id="uv-index">--</span>
                    </div>
                    <div class="metric-card">
                        <span class="label">Visibility</span>
                        <span class="value" id="visibility">-- km</span>
                    </div>
                    <div class="metric-card">
                        <span class="label">Air Quality (AQI)</span>
                        <span class="value" id="aqi">--</span>
                    </div>
                </div>
            </div>

            <div class="message-box" id="message-box" style="display: none;">
                Loading accurate data...
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
